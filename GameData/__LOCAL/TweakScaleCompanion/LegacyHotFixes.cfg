// In the long past, KSP Modding Scene was very uncooperative (and even toxic sometimes), and historically it was really hard to
// convince 3rd parties to accept pull requests to fix errors in their TweakScale patches.
//
// Most dudes gradly accepted the changes, but a few dull skulls sistematically refuse fixing their mess (some of them still do),
// and so I had no other way out of the mess but to cook these Hot Fixes.
//
// Nowadays, I just gave up and reimplemented everything The Right Way™ on the TweakScale Companion Program, but at that time I was
// still trying to find a way to cooperate with that thick heads. Nowadays, these are all deprecated in favour of full inhouse
// support implemented on the TweakScale Companion Program. They are here for historical reasons mostly, or for people that prefers
// to use older (pre 2.4.7) versions of TweakScale.
//
// How to activate the known Workarounds and HotFixes:
//
// 1. Uncomment the respective line
// 2. Good luck! 🤪
//

