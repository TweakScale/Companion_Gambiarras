// These patches were made pretty early, about 2019, when rogue add'ons were injecting TweakScale data twice on the same MODULE.
//
// This potentially could play havoc, as TweakScale had lost the hability to upgrade scalings due the KSP Upgrade Pipeline stunt
// overruling the implemented internal upgrading. Since very few, if any, of us ever managed to understand that weird and
// excesslively complex "Pipeline", I decided to play safe and cooked a way to keep the patches broken for savegames still in course.
//
// Uncertain if this thing was ever really needed, but better safer than sorrier.
//
// How to break down screwed TweakScale patches to preserve legacy savegames:
//
// 1. Uncomment the respective line
// 2. Good luck! 🤪
//
// You shoud really avoid these, honest. Do not start new savegames with these crapfest active!
//

// Uncomment the line below to "break back" B9 HX. See https://github.com/TweakScale/Companion_Gambiarras/blob/dev/GameData/TweakScaleCompanion/Gambiarras/Legacy/BreakingParts/B9_HX.cfg
//@PART[this-thingy-doesnt-exists]:FOR[TWEAKSCALECOMPANION-GAMBIARRA-BREAKINGPARTS-B9HX] { }

