// Workaround to salvage savegames suffering from parts with double patching
//
// See the following issues for details:
//		https://github.com/TweakScale/TweakScale/issues/34
//		https://github.com/TweakScale/Companion_Gambiarras/issues/6
//			previously https://github.com/TweakScale/TweakScale/issues/49
//		https://github.com/TweakScale/Companion_Gambiarras/issues/5
//			previously https://github.com/TweakScale/TweakScale/issues/56
//

@PART[mk4cockpit-shoulder-1]:NEEDS[TweakScale,TWEAKSCALECOMPANION-GAMBIARRA-BREAKINGPARTS-MarkIVSystem]:FINAL
{
	-MODULE[TweakScale],*
	%MODULE[TweakScale]
	{
		ISSUE_OVERRULE = "#34"
		name = TweakScale
		type = stack
		defaultScale = 5.0
		type = surface
	}
}

