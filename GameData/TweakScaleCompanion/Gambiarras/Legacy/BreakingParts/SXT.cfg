@PART[SXTWingSmall]:NEEDS[TweakScale,TWEAKSCALECOMPANION-GAMBIARRA-BREAKINGPARTS-SXT]:FINAL
{
	-MODULE[TweakScale],*
	%MODULE[TweakScale]
	{
		ISSUE_OVERRULE = "#34"
		name = TweakScale
		type = surface
		defaultScale = 1.25
		type = free
	}
}

