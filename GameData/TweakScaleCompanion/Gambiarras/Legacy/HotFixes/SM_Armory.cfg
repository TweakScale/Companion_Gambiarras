//
// This patch fixes the double patching caused by an problematic patch on SM_Armory.
//
// The offending path is GameData/SM_Armory/tweakscale.cfg
//
// and the problem happens due the patch being applying over some parts that have TweakScale
// hardcoded on its definition. This HotFix choose to use the original part definitions,
// ignoring the faulty patching.
//

@PART[M50FixedAero]:NEEDS[TweakScale,SM_Armory,TWEAKSCALECOMPANION-GAMBIARRA-HOTFIX-SM_Armory]:FINAL
{
	-MODULE[TweakScale],* { }
	%MODULE[TweakScale]
	{
		type = surface
		HOTFIX = https%3A//github.com/TweakScale/Companion_Gambiarras/issues/3
	}
}

@PART[Single30TurretAlpha]:NEEDS[TweakScale,SM_Armory,TWEAKSCALECOMPANION-GAMBIARRA-HOTFIX-SM_Armory]:FINAL
{
	-MODULE[TweakScale],* { }
	%MODULE[TweakScale]
	{
		type = free
		HOTFIX = https%3A//github.com/TweakScale/Companion_Gambiarras/issues/3
	}
}

@PART[GeneralDynamicsXM301]:NEEDS[TweakScale,SM_Armory,TWEAKSCALECOMPANION-GAMBIARRA-HOTFIX-SM_Armory]:FINAL
{
	-MODULE[TweakScale],* { }
	%MODULE[TweakScale]
	{
		type = surface
		HOTFIX = https%3A//github.com/TweakScale/Companion_Gambiarras/issues/3
	}
}

