//
// This patch fixes the unholy patching caused by an blindly adding a Fuel Switch module
// on a part that already have another Fuel Switch installed.
//
// There're many offending patches for this problem.
//
// This patch brute-forces a solution by bluntly deleting one Fuel Switch if both
// the following are found:
//
//	* ModuleFuelTank
//	* ModuleB9PartSwitch
//
// And the user prefers to use MFT over B9's
//
// References:
// https://github.com/TweakScale/Companion_Gambiarras/issues/1
//		previously https://github.com/TweakScale/TweakScale/issues/12
// https://github.com/TweakScale/Companion_Gambiarras/issues/2
//		previously https://github.com/TweakScale/TweakScale/issues/15
//

@PART[*]:HAS[@MODULE[TweakScale]&@MODULE[ModuleFuelTank]&@MODULE[ModuleB9PartSwitch]]:NEEDS[TweakScale,ModuleFuelTank,B9PartSwitch,TWEAKSCALECOMPANION-GAMBIARRA-HOTFIX-MFT-B9FS-PREFERMFT]:FINAL // This patch should be final, indeed.
{
	-MODULE[ModuleB9PartSwitch],* { }
	@MODULE[TweakScale]
	{
		HOTFIX = https%3A//forum.kerbalspaceprogram.com/index.php%3F/topic/179030-14-tweakscale-under-lisias-management-2433-2019-0814/%26do%3DfindComment%26comment%3D3661426
	}
}
